name: Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Deploy demo site to GitHub Pages — only on main branch pushes
  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Prepare demo site
        run: |
          mkdir -p _site
          # Rewrite the dev module script to point at the built IIFE bundle.
          # The source index.html uses /src/index.ts (Vite dev only) — GH Pages needs the dist file.
          sed 's|<script type="module" src="/src/index.ts"|<script src="dist/llm-widget.iife.js"|' index.html > _site/index.html
          cp -r dist/ _site/dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4

  # Create GitHub Release with built assets — only on version tags
  # After release, jsDelivr serves:
  # https://cdn.jsdelivr.net/gh/mighty840/llm-widget@v0.1.0/dist/llm-widget.iife.js
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci && npm run build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/llm-widget.iife.js
            dist/llm-widget.js
          generate_release_notes: true
